<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘却前夜 — 編成アーカイブ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #12121a;
    --surface2: #1a1a26;
    --border:   #2a2a3f;
    --accent:   #7eb8c9;
    --accent2:  #c9a87e;
    --text:     #d4d4e0;
    --text-dim: #7a7a9a;
    --danger:   #c97e7e;
    --glow:     rgba(126,184,201,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(126,184,201,0.06) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(42,42,63,0.15) 60px, rgba(42,42,63,0.15) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(42,42,63,0.15) 60px, rgba(42,42,63,0.15) 61px);
  }

  /* ── ヘッダー ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(12px);
    background: rgba(10,10,15,0.85);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); font-weight: 400; font-size: 12px; margin-left: 8px; }
  @media (max-width: 480px) {
    .logo { font-size: 16px; }
    .logo span { font-size: 10px; margin-left: 6px; }
    header { padding: 0 12px; }
  }

  /* ── ボタン ── */
  .btn {
    border: none; cursor: pointer; font-family: 'Noto Serif JP', serif;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, #5a9baf 100%);
    color: #0a0a0f;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 8px 14px;
    font-size: 12px;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── メインレイアウト ── */
  main { max-width: 1200px; margin: 0 auto; padding: 28px 16px; }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* ── 編成グリッド ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  /* ── 編成カード ── */
  .deck-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 14px;
    position: relative;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .deck-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .deck-card:hover { border-color: rgba(126,184,201,0.4); box-shadow: 0 0 20px var(--glow); }
  .deck-card:hover::before { opacity: 1; }

  /* 空スロット：クリックで編成入力 */
  .deck-card.empty {
    border-style: dashed;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s, border-color 0.2s;
  }
  .deck-card.empty:hover { opacity: 1; border-color: var(--accent); border-style: solid; }

  /* ── カードヘッダー ── */
  .deck-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 8px;
  }
  .deck-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 24px;
    flex-shrink: 0;
  }

  /* チーム名インライン編集 */
  .deck-name-wrap { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
  .deck-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    padding: 2px 0;
  }
  .deck-name-input:focus { border-bottom-color: var(--accent); }
  .deck-name-input::placeholder { color: var(--text-dim); opacity: 0.5; }

  .deck-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── スロット行 ── */
  .slots-row { display: flex; gap: 4px; margin-bottom: 6px; }
  .slot {
    flex: 1;
    aspect-ratio: 250/388;
    background: var(--surface2);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .slot img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
  }
  .slot-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--border);
  }

  /* 空カードのタップ誘導 */
  .empty-slots-hint {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 0;
    gap: 6px;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .empty-slots-hint .plus { font-size: 24px; color: var(--border); }

  /* ── トースト ── */
  .copy-toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 9px 22px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── モーダル共通 ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.22s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 540px; max-width: 96vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
    position: relative;
    transform: translateY(14px);
    transition: transform 0.22s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-close {
    position: absolute; top: 18px; right: 18px;
    background: transparent; border: none;
    color: var(--text-dim); font-size: 18px; cursor: pointer;
  }
  .modal-close:hover { color: var(--text); }

  label { display: block; font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 6px; }
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    padding: 10px;
    resize: vertical;
    min-height: 140px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }

  .parse-preview {
    margin-top: 14px; padding: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: none;
  }
  .parse-preview.visible { display: block; }
  .preview-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .preview-tag {
    font-size: 11px; padding: 3px 8px;
    background: rgba(126,184,201,0.1);
    border: 1px solid rgba(126,184,201,0.2);
    color: var(--accent);
  }
  .preview-tag.card-tag {
    background: rgba(201,168,126,0.1);
    border-color: rgba(201,168,126,0.2);
    color: var(--accent2);
  }
  .parse-error { color: var(--danger); font-size: 12px; margin-top: 8px; }
  .modal-footer {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 20px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>

<header>
  <div class="logo">忘却前夜<span>編成アーカイブ</span></div>
  <button class="btn btn-primary" onclick="openAddModal()">＋ 編成を追加</button>
</header>

<main>
  <div class="page-title">Preset Archive — 100 Slots</div>
  <div class="grid" id="grid"></div>
</main>

<div class="copy-toast" id="toast">テキストをコピーしました</div>

<!-- 編成入力モーダル（追加 & 上書き共用） -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:4px;" id="modalTitle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>

    <!-- 隠しtextarea（長押しペースト用） -->
    <textarea id="pasteArea" oninput="parseInput()" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;"></textarea>

    <!-- ペースト待機 / パース結果 -->
    <div id="pasteHint" style="
      border:1px dashed var(--border);
      padding:24px;
      text-align:center;
      color:var(--text-dim);
      font-size:13px;
      cursor:pointer;
      margin-bottom:14px;
    " onclick="focusPaste()">
      <div style="font-size:22px;margin-bottom:8px;">📋</div>
      長押しでペースト
    </div>

    <div class="parse-preview" id="preview">
      <!-- 画像プレビュー上段 -->
    <div id="previewUnits" style="display:flex;gap:4px;margin-bottom:10px;"></div>
    <div id="previewCards" style="display:flex;gap:4px;margin-bottom:10px;"></div>
    </div>
    <div class="parse-error" id="parseError"></div>

    <div style="margin-top:4px;">
      <label>メモ（任意）</label>
      <textarea id="memoArea" placeholder="使い方・補足など" style="min-height:55px;"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost btn-danger" id="clearBtn" onclick="clearFromModal()" style="display:none;margin-right:auto;border-color:var(--danger);color:var(--danger);">編成を消去</button>
      <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveDeck()" disabled>保存</button>
    </div>
  </div>
</div>

// ── ストレージ ────────────────────────────────────────
const STORAGE_KEY = 'amnesia_decks_v2';
const MAX_SLOTS = 100;

function loadSlots() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(saved) && saved.length === MAX_SLOTS) return saved;
  } catch {}
  // 初期化：50スロット全部空
  return Array.from({length: MAX_SLOTS}, (_, i) => ({
    index: i,
    label: 'チーム' + (i + 1),  // デフォルト名
    data: null  // null = 空
  }));
}

function saveSlots(slots) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(slots));
}

// ── パーサー ──────────────────────────────────────────
function parseShareText(raw) {
  const text = raw.replace(/^「|」$/g, '').trim();
  const nameMatch = text.match(/チーム名：(.+)/);
  if (!nameMatch) throw new Error('チーム名が見つかりません');
  const teamName = nameMatch[1].trim();
  const codeMatch = text.match(/@@([^@]+)@@/);
  const code = codeMatch ? codeMatch[1] : '';
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const nameIdx = lines.findIndex(l => l.startsWith('チーム名：'));
  if (nameIdx < 0) throw new Error('フォーマットエラー');
  const dataLines = lines.slice(nameIdx + 1).filter(l =>
    l.includes('、') && !l.startsWith('守') && !l.startsWith('対') && !l.startsWith('@@')
  );
  if (dataLines.length < 2) throw new Error('キャラ・カード行が見つかりません');
  const units = dataLines[0].split('、').map(s => s.trim()).filter(Boolean);
  const cards = dataLines[1].split('、').map(s => s.trim()).filter(Boolean);
  const ownerMatch = text.match(/守秘者：[^（\n]*（(\d+)）/);
  const uid = ownerMatch ? ownerMatch[1] : '';
  return { teamName, units, cards, code, uid, raw: raw.trim() };
}

// ── フォーカス（長押しペースト用） ───────────────────
function focusPaste() {
  const ta = document.getElementById('pasteArea');
  ta.style.opacity = '1';
  ta.style.position = 'fixed';
  ta.style.top = '0'; ta.style.left = '0';
  ta.style.width = '100vw'; ta.style.height = '100vh';
  ta.style.zIndex = '9999';
  ta.style.background = 'rgba(0,0,0,0.01)';
  ta.focus();
  ta.addEventListener('blur', hidePasteArea, {once:true});
}
function hidePasteArea() {
  const ta = document.getElementById('pasteArea');
  ta.style.opacity = '0';
  ta.style.position = 'absolute';
  ta.style.width = '1px'; ta.style.height = '1px';
  ta.style.zIndex = '';
}

// ── パース → プレビュー（画像） ──────────────────────
let parsedData = null;
let targetSlotIndex = null;

function parseInput() {
  hidePasteArea();
  const raw = document.getElementById('pasteArea').value;
  const preview = document.getElementById('preview');
  const errEl = document.getElementById('parseError');
  const saveBtn = document.getElementById('saveBtn');
  const hint = document.getElementById('pasteHint');
  errEl.textContent = '';
  preview.classList.remove('visible');
  parsedData = null;
  saveBtn.disabled = true;
  if (!raw.trim()) return;
  try {
    parsedData = parseShareText(raw);

    // 画像プレビュー
    document.getElementById('previewUnits').innerHTML =
      parsedData.units.map(n => previewSlotHTML(n)).join('');
    document.getElementById('previewCards').innerHTML =
      parsedData.cards.map(n => previewSlotHTML(n)).join('');

    hint.innerHTML = `<div style="font-size:11px;color:var(--accent);">✓ ${parsedData.teamName}</div>`;
    preview.classList.add('visible');
    saveBtn.disabled = false;
  } catch(e) {
    errEl.textContent = '⚠ ' + e.message;
    hint.innerHTML = `<div style="font-size:22px;margin-bottom:8px;">📋</div>長押しでペースト`;
  }
}

function previewSlotHTML(name) {
  const imgSrc = getUnitImg(name) || getCardImg(name);
  return `<div style="flex:1;aspect-ratio:250/388;background:var(--surface2);border:1px solid var(--border);overflow:hidden;position:relative;max-width:60px;">
    ${imgSrc
      ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;object-position:top;">`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--border);">✦</div>`
    }
  </div>`;
}

// ── 保存 ──────────────────────────────────────────────
function saveDeck() {
  if (!parsedData) return;
  const slots = loadSlots();
  const memo = document.getElementById('memoArea').value.trim();

  if (targetSlotIndex !== null) {
    // 上書きモード：指定スロットに保存、ラベルはそのまま
    slots[targetSlotIndex].data = {
      units: parsedData.units,
      cards: parsedData.cards,
      code: parsedData.code,
      uid: parsedData.uid,
      raw: parsedData.raw,
      memo,
      savedAt: new Date().toLocaleDateString('ja-JP')
    };
  } else {
    // 追加モード：最初の空スロットに入れる
    const emptyIdx = slots.findIndex(s => !s.data);
    if (emptyIdx < 0) { alert('スロットが全て埋まっています'); return; }
    slots[emptyIdx].data = {
      units: parsedData.units,
      cards: parsedData.cards,
      code: parsedData.code,
      uid: parsedData.uid,
      raw: parsedData.raw,
      memo,
      savedAt: new Date().toLocaleDateString('ja-JP')
    };
  }
  saveSlots(slots);
  closeModal();
  render();
}

// ── ラベル保存 ────────────────────────────────────────
function saveLabel(index, value) {
  const slots = loadSlots();
  slots[index].label = value || ('チーム' + (index + 1));
  saveSlots(slots);
}

// ── 削除 ──────────────────────────────────────────────
function clearSlot(index, e) {
  e.stopPropagation();
  if (!confirm('この編成をクリアしますか？')) return;
  const slots = loadSlots();
  slots[index].data = null;
  saveSlots(slots);
  render();
}

// ── コピー ────────────────────────────────────────────
function copyRaw(raw, e) {
  if (e) e.stopPropagation();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(raw).then(() => showToast()).catch(() => fallbackCopy(raw));
  } else {
    fallbackCopy(raw);
  }
}
function fallbackCopy(raw) {
  const ta = document.createElement('textarea');
  ta.value = raw;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); showToast(); } catch {}
  document.body.removeChild(ta);
}
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── スロットHTML ──────────────────────────────────────
function slotHTML(name) {
  // unitMap・cardMap両方チェック
  const imgSrc = getUnitImg(name) || getCardImg(name);
  return `<div class="slot">
    ${imgSrc
      ? `<img src="${imgSrc}" alt="${name}" loading="lazy">`
      : `<div class="slot-placeholder">✦</div>`}
  </div>`;
}

// ── レンダリング ──────────────────────────────────────
function render() {
  const slots = loadSlots();
  const grid = document.getElementById('grid');

  grid.innerHTML = slots.map((slot, i) => {
    const num = String(i + 1).padStart(2, '0');

    if (!slot.data) {
      // 空スロット
      return `
        <div class="deck-card empty" onclick="openSlotModal(${i})">
          <div class="deck-header">
            <span class="deck-number">${num}</span>
            <div class="deck-name-wrap">
              <input class="deck-name-input" value="${escHtml(slot.label)}"
                placeholder="チーム名"
                onclick="event.stopPropagation()"
                onchange="saveLabel(${i}, this.value)"
              >
            </div>
          </div>
          <div class="empty-slots-hint">
            <span class="plus">＋</span>
            <span>編成を貼り付けて入力</span>
          </div>
        </div>`;
    }

    const d = slot.data;
    return `
      <div class="deck-card" onclick="openSlotModal(${i})">
        <div class="deck-header">
          <span class="deck-number">${num}</span>
          <div class="deck-name-wrap">
            <input class="deck-name-input" value="${escHtml(slot.label)}"
              placeholder="チーム名"
              onclick="event.stopPropagation()"
              onchange="saveLabel(${i}, this.value)"
            >
          </div>
          <div class="deck-actions">
            <button class="icon-btn" title="コピー" onclick='copyRaw(${JSON.stringify(d.raw)}, event)'>⎘</button>
          </div>
        </div>
        <div class="slots-row">
          ${d.units.map(n => slotHTML(n)).join('')}
        </div>
        <div class="slots-row">
          ${d.cards.map(n => slotHTML(n)).join('')}
        </div>
        ${d.memo ? `<div style="font-size:10px;color:var(--text-dim);margin-top:6px;">${escHtml(d.memo)}</div>` : ''}
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

    (hasData ? '編成を上書き — ' : '編成を入力 — ') + label;

function resetModal() {
  document.getElementById('pasteArea').value = '';

document.addEventListener('contextmenu', e => {
  // モーダルが開いていたら無視
  if (document.getElementById('modal').classList.contains('open')) return;
  if (document.getElementById('testModal').classList.contains('open')) return;
  e.preventDefault();
  tryPasteFromClipboard();
});

async function tryPasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (!text.trim()) return;
    handleMainPaste(text);
  } catch {
    // clipboard APIが使えない場合は隠しtextareaフォーカス
    showMainPasteArea();
  }
}

function showMainPasteArea() {
  const ta = document.getElementById('mainPasteArea');
  ta.value = '';
  ta.style.opacity = '0.01';
  ta.style.zIndex = '9999';
  ta.focus();
}

function handleMainPaste(text) {
  try {
    const parsed = parseShareText(text);
    showPastePopup(parsed, text);
  } catch(e) {
    // パース失敗は無視
  }
}

function showPastePopup(parsed, rawText) {
  document.getElementById('popupTeamName').textContent = parsed.teamName;
  document.getElementById('popupUnits').innerHTML = parsed.units.map(n => previewSlotHTML(n)).join('');
  document.getElementById('popupCards').innerHTML = parsed.cards.map(n => previewSlotHTML(n)).join('');
  window._pendingParsed = { parsed, rawText };
  document.getElementById('pastePopup').classList.add('open');
}

function closePastePopup() {
  document.getElementById('pastePopup').classList.remove('open');
  document.getElementById('popupMemo').value = '';
  window._pendingParsed = null;
}

function confirmPastePopup() {
  if (!window._pendingParsed) return;
  const { parsed, rawText } = window._pendingParsed;
  const memo = document.getElementById('popupMemo').value.trim();
  const slots = loadSlots();
  const emptyIdx = slots.findIndex(s => !s.data);
  if (emptyIdx < 0) { alert('スロットが全て埋まっています'); closePastePopup(); return; }
  slots[emptyIdx].data = {
    units: parsed.units,
    cards: parsed.cards,
    code: parsed.code,
    uid: parsed.uid,
    raw: rawText.trim(),
    memo,
    savedAt: new Date().toLocaleDateString('ja-JP')
  };
  saveSlots(slots);
  closePastePopup();
  render();
}

    <button class="modal-close" onclick="closeTestModal()">✕</button>

    <!-- タブ -->
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button id="tab-unit" onclick="renderTestGrid('unit')" style="background:transparent;border:1px solid var(--accent);color:var(--accent);padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Noto Serif JP',serif;">キャラ (43)</button>
      <button id="tab-card" onclick="renderTestGrid('card')" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Noto Serif JP',serif;">運命の札 (101)</button>
      <button id="tab-key"  onclick="renderTestGrid('key')"  style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Noto Serif JP',serif;">キーオーダー (24)</button>
    </div>

    <div id="testGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:10px;max-height:60vh;overflow-y:auto;"></div>

    <div style="margin-top:12px;font-size:10px;color:var(--text-dim);">
      ■青枠：画像登録済み　■赤枠：未登録または読み込みエラー
    </div>
  </div>
</div>

</body>
</html>
